name: Azure VM Deployment

on:
  push:
    branches: [main]
    paths: ['**.tf', '.github/workflows/deploy.yml']
  workflow_dispatch:
    inputs:
      os_type:
        description: 'Operating System'
        required: true
        default: 'linux'
        type: choice
        options: [linux, windows]
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    uses: mmuyideen/terraform-modules-and-pipelines/.github/workflows/terraform-ci.yml@main
    with:
      cloud_provider: azure
      action: ${{ inputs.action || 'plan' }}
      environment: dev
      extra_tf_vars: '{"os_type":"${{ inputs.os_type || ''linux'' }}"}'
    secrets:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TF_VAR_admin_password: ${{ secrets.TF_VAR_ADMIN_PASSWORD }}
      TF_VAR_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
